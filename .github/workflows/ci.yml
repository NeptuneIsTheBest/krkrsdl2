name: Continuous Integration

on:
  push:
  pull_request:

env:
  EXAMPLE_PROJECT_URL: https://github.com/krkrsdl2/krkrsdl2-kag3-demo/releases/download/latest/data.xp3

jobs:
  build-macos:
    name: macOS arm64 (${{ matrix.variant.name }})
    runs-on: macos-14
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        variant:
          - name: CLI
            bundle: "OFF"
            canvas: "OFF"
            binary: build/krkrsdl3
            archive: krkrsdl3-macos-arm64.zip
            artifact: krkrsdl3-macos-arm64
          - name: App Bundle
            bundle: "ON"
            canvas: "OFF"
            binary: build/krkrsdl3.app/Contents/MacOS/krkrsdl3
            archive: krkrsdl3-macos-arm64-app.zip
            artifact: krkrsdl3-macos-arm64-app
          - name: Canvas CLI
            bundle: "OFF"
            canvas: "ON"
            binary: build/krkrsdl3
            archive: krkrsdl3-macos-arm64-canvas.zip
            artifact: krkrsdl3-macos-arm64-canvas

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download example project for the app bundle
        if: matrix.variant.bundle == 'ON'
        run: curl --fail --location --output data.xp3 "$EXAMPLE_PROJECT_URL"

      - name: Configure
        run: >-
          cmake -S . -B build -G "Unix Makefiles"
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_OSX_ARCHITECTURES=arm64
          -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0
          -DOPTION_BUILD_MACOS_BUNDLE=${{ matrix.variant.bundle }}
          -DOPTION_ENABLE_CANVAS=${{ matrix.variant.canvas }}
          -DEMBED_DATA_PATH=${{ matrix.variant.bundle == 'ON' && 'data.xp3' || 'data' }}

      - name: Build
        run: cmake --build build --parallel

      - name: Validate target
        env:
          KRKRSDL3_BINARY: ${{ matrix.variant.binary }}
        run: |
          test "$(lipo -archs "$KRKRSDL3_BINARY")" = "arm64"
          test "$(otool -l "$KRKRSDL3_BINARY" | awk '/LC_BUILD_VERSION/{seen=1} seen && /minos/{print $2; exit}')" = "13.0"
          if otool -L "$KRKRSDL3_BINARY" | grep -E '(SDL2|SDL3|FAudio)'; then
            echo "Unexpected dynamic SDL or FAudio dependency" >&2
            exit 1
          fi

      - name: Archive CLI
        if: matrix.variant.bundle == 'OFF'
        run: ditto -ck --rsrc --sequesterRsrc build/krkrsdl3 "build/${{ matrix.variant.archive }}"

      - name: Archive app bundle
        if: matrix.variant.bundle == 'ON'
        run: ditto -ck --rsrc --sequesterRsrc --keepParent build/krkrsdl3.app "build/${{ matrix.variant.archive }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.variant.artifact }}
          path: build/${{ matrix.variant.archive }}

  generate-tp-stub:
    name: macOS arm64 plugin stub
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Generate plugin stub
        run: |
          mkdir -p build/krkrsdl3-tp_stub
          python3 src/core/base/sdl3/makestub.py build/krkrsdl3-tp_stub
          cp src/config/tp_stub_template.cmake build/krkrsdl3-tp_stub/CMakeLists.txt

      - name: Configure plugin stub
        run: >-
          cmake -S build/krkrsdl3-tp_stub -B build/krkrsdl3-tp_stub/build -G "Unix Makefiles"
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_OSX_ARCHITECTURES=arm64
          -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0

      - name: Build plugin stub
        run: cmake --build build/krkrsdl3-tp_stub/build --parallel

      - name: Validate plugin stub
        run: |
          test "$(lipo -archs build/krkrsdl3-tp_stub/build/libtp_stub.a)" = "arm64"
          test "$(otool -l build/krkrsdl3-tp_stub/build/CMakeFiles/tp_stub.dir/tp_stub.cpp.o | awk '/LC_BUILD_VERSION/{seen=1} seen && /minos/{print $2; exit}')" = "13.0"

      - name: Archive plugin stub
        run: tar -czf build/krkrsdl3-tp_stub.tar.gz --exclude=krkrsdl3-tp_stub/build -C build krkrsdl3-tp_stub

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: krkrsdl3-tp_stub
          path: build/krkrsdl3-tp_stub.tar.gz

  create-release:
    name: Publish latest macOS builds
    permissions:
      contents: write
    needs:
      - build-macos
      - generate-tp-stub
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Prepare release assets
        run: |
          cp krkrsdl3-macos-arm64/*.zip .
          cp krkrsdl3-macos-arm64-app/*.zip .
          cp krkrsdl3-macos-arm64-canvas/*.zip .
          cp krkrsdl3-tp_stub/*.tar.gz .

      - name: Create prerelease
        uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: true
          automatic_release_tag: latest
          title: Latest development builds
          files: |
            *.zip
            *.tar.gz
